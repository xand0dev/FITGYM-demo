<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FITGYM — Особистий кабінет</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <link rel="stylesheet" href="css/0-critical.css">
    <link rel="stylesheet" href="css/0-base.css">
    <link rel="stylesheet" href="css/1-layout.css">
    <link rel="stylesheet" href="css/2-components.css">
    <link rel="stylesheet" href="css/3-pages.css">
    <link rel="stylesheet" href="css/4-utilities.css">
</head>
<body>

<header class="site-header">
    <div class="container header-inner">
        <div class="logo">FIT<span>GYM</span></div>
        <nav class="nav-primary">
            <a href="index.html">Головна</a>
            <a href="index.html#schedule">Розклад</a>
            <a href="index.html#trainers">Тренери</a>
            <a href="index.html#plans">Абонементи</a>
        </nav>
        <div id="authArea"></div>
        <button class="hamburger" aria-label="Toggle navigation">
            <span></span><span></span><span></span>
        </button>
    </div>
</header>

<section id="cabinet" class="section container">
    <h2 class="section-title" data-aos="fade-up">Особистий Кабінет</h2>

    <div class="cabinet-grid">
        <div class="profile-card" data-aos="fade-right">
            <div class="profile-header">
                <img id="user-avatar" src="img/муж1.png" alt="User" class="user-avatar">
                <h3 id="user-name">Завантаження...</h3>
                <p id="user-role" class="user-role">Учасник клубу</p>
            </div>
            <div class="profile-details" id="profile-info">
                <div class="text-center">
                    <i class="fas fa-spinner fa-spin"></i>
                </div>
            </div>
            <button id="logoutButton" class="btn btn-primary" style="margin-top: 20px; width: 100%;">
                <i class="fas fa-sign-out-alt"></i> Вийти
            </button>
        </div>

        <div class="schedule-card" data-aos="fade-left">
            <h3 class="schedule-title">Мої тренування</h3>
            <div id="bookings-list" class="user-schedule-list">
                <div class="text-center">
                    <i class="fas fa-spinner fa-spin"></i>
                </div>
            </div>
            <a href="index.html#schedule" class="btn btn-ghost" style="width: 100%; margin-top: 20px;">
                <i class="fas fa-calendar-plus"></i> Записатись ще
            </a>
        </div>
    </div>
</section>

<footer class="site-footer" id="footer-main">
    <div class="container footer-bottom">
        <div class="copyright">© 2025 FITGYM.</div>
    </div>
</footer>

<div id="toast-container"></div>
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script src="js/modules/cabinet.js" type="module"></script>

</body>
</html>
