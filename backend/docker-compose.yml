# FITGYM — production-готовий docker-compose
# Запуск: docker compose up -d
# Перевірка: http://localhost:8000/api/docs/
#
# Перед стартом створи .env поряд з цим файлом з такими змінними:
#   POSTGRES_USER=fitgym
#   POSTGRES_PASSWORD=changeme
#   POSTGRES_DB=fitgym
#   DJANGO_SECRET_KEY=...
#   DEBUG=False
#   ALLOWED_HOSTS=fitgym.example.com,localhost
#   LIQPAY_PUBLIC_KEY=...
#   LIQPAY_PRIVATE_KEY=...
#   TELEGRAM_BOT_TOKEN=...

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fitgym}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-fitgym}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-fitgym}"]
      interval: 10s
      retries: 5
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      sh -c "python manage.py migrate &&
             gunicorn gym_project.wsgi --bind 0.0.0.0:8000 --workers 3"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-fitgym}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-fitgym}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-insecure-change-me}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-*}
      LIQPAY_PUBLIC_KEY: ${LIQPAY_PUBLIC_KEY:-}
      LIQPAY_PRIVATE_KEY: ${LIQPAY_PRIVATE_KEY:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
    volumes:
      - media:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # Telegram bot як окремий процес (опційно — запустити вручну при потребі)
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    command: python manage.py runbot
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-fitgym}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-fitgym}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-insecure-change-me}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
    depends_on:
      db:
        condition: service_healthy
      web:
        condition: service_started
    restart: unless-stopped
    profiles:
      - bot  # запускається тільки якщо `docker compose --profile bot up`

volumes:
  pgdata:
  media:
